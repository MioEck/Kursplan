<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Busfahrer Kursplan</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#f5a623">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Kursplan">
<link rel="apple-touch-icon" href="icon-512.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#071a07;--s1:#0e2b0e;--s2:#163d16;--acc:#4caf50;--txt:#d8f0d8;--mut:#7ac17b;--brd:#2d6b2b;--red:#ef4444;--grn:#3a8e38;}
:root.light{--bg:#e8f5e8;--s1:#ffffff;--s2:#d0ebd0;--acc:#2e7d32;--txt:#0a1f0a;--mut:#3a8e38;--brd:#7ac17b;--red:#ef4444;--grn:#2e7d32;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;}
header{display:flex;align-items:center;gap:12px;padding:16px;border-bottom:1px solid var(--brd);position:sticky;top:0;z-index:100;background:var(--bg);}
.logo{width:40px;height:40px;background:#2d6b2b;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.htxt{flex:1;}
.htxt h1{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:2px;}
.htxt p{font-size:12px;color:var(--mut);}
#gpsBtn{display:flex;flex-direction:column;align-items:center;gap:2px;background:var(--s2);border:1.5px solid var(--brd);border-radius:10px;padding:6px 10px;cursor:pointer;min-width:60px;flex-shrink:0;transition:all .2s;}
#gpsBtn.on{background:var(--grn);border-color:var(--grn);}
#gpsBtn.searching{background:#f59e0b;border-color:#f59e0b;}
#gpsLbl{font-size:9px;font-weight:700;letter-spacing:1px;color:var(--mut);font-family:'DM Sans',sans-serif;}
#gpsBtn.on #gpsLbl,#gpsBtn.searching #gpsLbl{color:#fff;}
#gpsBar{display:none;background:var(--s2);border-bottom:1px solid var(--brd);padding:6px 16px;font-size:12px;color:var(--mut);display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
#gpsBar.visible{display:flex;}
.gps-dot{width:8px;height:8px;border-radius:50%;background:var(--mut);flex-shrink:0;}
.gps-dot.found{background:var(--grn);box-shadow:0 0 0 3px rgba(46,204,113,.3);}
.gps-dot.searching{background:#f59e0b;animation:pulse .8s infinite alternate;}
@keyframes pulse{from{opacity:.4}to{opacity:1}}
.tabs{padding:12px 16px 6px;overflow-x:auto;display:flex;gap:8px;scrollbar-width:none;-webkit-overflow-scrolling:touch;flex-wrap:nowrap;}
.tabs::-webkit-scrollbar{display:none;}
.tab{flex-shrink:0;cursor:pointer;padding:9px 13px;background:var(--s1);border:1.5px solid var(--brd);border-radius:12px;display:flex;flex-direction:column;align-items:center;gap:2px;transition:all .2s;user-select:none;}
.tab .tn{font-family:'Bebas Neue',sans-serif;font-size:19px;letter-spacing:1px;color:var(--txt);line-height:1;}
.tab .tl{font-size:10px;color:var(--mut);}
.tab.active{background:var(--acc);border-color:var(--acc);}
.tab.active .tn,.tab.active .tl{color:#0f1117;}
.tab.add{border-style:dashed;}
.tab-filter{flex-shrink:0;cursor:pointer;padding:9px 13px;background:var(--s1);border:1.5px solid var(--brd);border-radius:12px;display:flex;flex-direction:column;align-items:center;gap:2px;transition:all .2s;user-select:none;}
.tab-filter .tn{font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:1px;color:var(--txt);line-height:1;}
.tab-filter .tl{font-size:10px;color:var(--mut);}
.tab-filter.active-schule{background:#1b5e20;border-color:#4caf50;}
.tab-filter.active-schule .tn,.tab-filter.active-schule .tl{color:#fff;}
.tab-filter.active-we{background:#2e7d32;border-color:#7ac17b;}
.tab-filter.active-we .tn,.tab-filter.active-we .tl{color:#fff;}
main{padding:12px 16px 100px;}
.kh{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px;}
.kt{font-family:'Bebas Neue',sans-serif;font-size:30px;letter-spacing:2px;}
.ks{display:flex;gap:12px;font-size:12px;color:var(--mut);flex-wrap:wrap;margin-top:2px;}
.ll{display:flex;flex-direction:column;gap:10px;}
.lc{background:var(--s1);border:1px solid var(--brd);border-radius:16px;overflow:hidden;transition:border-color .2s;}
.lc.exp{border-color:var(--acc);}
.lch{display:grid;grid-template-columns:94px 1fr auto;gap:10px;align-items:center;padding:12px 14px;cursor:pointer;user-select:none;}
.lb{width:90px;min-height:54px;border-radius:10px;background:var(--s2);border:1.5px solid var(--brd);display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0;padding:4px;}
.bl{font-size:12px;color:var(--mut);text-transform:uppercase;letter-spacing:1px;font-weight:600;}
.bn{font-family:'Bebas Neue',sans-serif;font-size:18px;color:var(--acc);line-height:1;}
.bfl{font-size:11px;color:var(--mut);text-transform:uppercase;margin-top:2px;}
.bf{font-family:'Bebas Neue',sans-serif;font-size:24px;color:var(--txt);line-height:1;}
.li{min-width:0;}
.lr{font-weight:600;font-size:22px;display:flex;align-items:center;gap:5px;flex-wrap:wrap;}
.ar{color:var(--mut);}
.lt{display:flex;gap:10px;margin-top:4px;font-size:22px;color:var(--mut);}
.ca{display:flex;gap:5px;margin-top:5px;}
.ca button{border:none;background:var(--s2);color:var(--mut);border-radius:6px;padding:5px 10px;font-size:14px;cursor:pointer;font-family:'DM Sans',sans-serif;}
.ca button:hover{background:var(--acc);color:#0f1117;}
.ca .dbtn:hover{background:var(--red);color:#fff;}
.ri{text-align:right;flex-shrink:0;display:flex;flex-direction:column;align-items:flex-end;gap:4px;}
.dp{background:var(--s2);border-radius:8px;padding:6px 12px;font-size:15px;font-weight:500;}
.ea{font-size:16px;color:var(--mut);transition:transform .25s;}
.lc.exp .ea{transform:rotate(180deg);color:var(--acc);}
.sp{display:none;border-top:1px solid var(--brd);padding:0 14px 14px;}
.lc.exp .sp{display:block;}
.sl{margin-top:12px;position:relative;}
.sl::before{content:'';position:absolute;left:10px;top:8px;bottom:8px;width:2px;background:var(--brd);}
.sr{display:flex;align-items:flex-start;gap:10px;padding:4px 0;}
.sd{width:22px;height:22px;flex-shrink:0;border-radius:50%;background:var(--s2);border:2px solid var(--brd);position:relative;z-index:1;margin-top:1px;}
.sr.first .sd{background:var(--acc);border-color:var(--acc);}
.sr.last .sd{background:var(--grn);border-color:var(--grn);}
.sr.cur .sd{background:var(--grn);border-color:var(--grn);box-shadow:0 0 0 4px rgba(46,204,113,.3);}
.sr.cur .st{color:var(--grn);font-size:17px;}
.sr.cur .sn{color:var(--grn);font-weight:700;font-size:17px;}
.sr.past .sd{background:#2a2a2a;border-color:#333;}
.sr.past .st,.sr.past .sn{color:#444;}
.sr.past .sn{text-decoration:line-through;}
.st{font-size:15px;font-weight:600;min-width:38px;color:var(--txt);margin-top:1px;}
.sn{font-size:15px;color:var(--mut);line-height:1.3;flex:1;}
.sr.first .sn,.sr.last .sn{color:var(--txt);font-weight:600;}
.pb{background:#ef4444;border:none;border-radius:50%;width:28px;height:28px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:16px;box-shadow:0 2px 6px rgba(239,68,68,.5);}
.pb:hover{opacity:1;}
.empty{text-align:center;padding:48px 0;color:var(--mut);}
.empty .bi{font-size:44px;margin-bottom:10px;}
.fab{position:fixed;bottom:22px;right:16px;background:var(--acc);color:#0f1117;border:none;border-radius:14px;padding:12px 18px;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:8px;box-shadow:0 8px 24px rgba(245,166,35,.4);z-index:200;}
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:300;align-items:flex-end;justify-content:center;}
.ov.open{display:flex;}
.mo{background:var(--s1);border-radius:22px 22px 0 0;padding:22px 18px 30px;width:100%;max-width:560px;border:1px solid var(--brd);border-bottom:none;max-height:90vh;overflow-y:auto;}
.mo h2{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;margin-bottom:14px;}
.fg{margin-bottom:11px;}
.fg label{display:block;font-size:11px;color:var(--mut);margin-bottom:3px;font-weight:500;text-transform:uppercase;letter-spacing:.5px;}
.fg input{width:100%;background:var(--bg);border:1.5px solid var(--brd);color:var(--txt);border-radius:10px;padding:9px 12px;font-family:'DM Sans',sans-serif;font-size:14px;outline:none;}
.fg input:focus{border-color:var(--acc);}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.ma{display:flex;gap:10px;margin-top:14px;}
.bp{flex:1;background:var(--acc);color:#0f1117;border:none;border-radius:11px;padding:12px;font-family:'DM Sans',sans-serif;font-weight:600;font-size:15px;cursor:pointer;}
.bs{background:var(--s2);color:var(--mut);border:none;border-radius:11px;padding:12px 16px;font-family:'DM Sans',sans-serif;font-size:15px;cursor:pointer;}
.se-row{display:flex;gap:6px;margin-bottom:5px;align-items:center;}
.se-row input{flex:1;}
.se-row .ti{width:66px;flex:none;}
.se-row button{background:none;border:none;color:var(--mut);font-size:17px;cursor:pointer;}
.asb{background:var(--s2);border:1px dashed var(--brd);color:var(--mut);border-radius:8px;padding:7px;width:100%;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;margin-top:2px;}
.export-bar{display:flex;gap:8px;padding:10px 16px;border-bottom:1px solid var(--brd);flex-wrap:wrap;}
.export-btn{background:var(--s2);border:1.5px solid var(--brd);color:var(--txt);border-radius:10px;padding:8px 14px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px;}
.export-btn:hover{border-color:var(--acc);color:var(--acc);}
.export-btn.imp:hover{border-color:var(--grn);color:var(--grn);}
.sync-bar{background:var(--s2);border-bottom:1px solid var(--brd);padding:8px 16px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.lock-btn{background:none;border:none;font-size:22px;cursor:pointer;padding:4px 8px;line-height:1;}
.admin-only{display:none;}
.admin-only.visible{display:flex;}
.admin-btn-inline{display:none;}
.admin-btn-inline.visible{display:inline-flex;}
.sync-btn{background:var(--acc);color:#0f1117;border:none;border-radius:10px;padding:9px 16px;font-family:'DM Sans',sans-serif;font-weight:700;font-size:14px;cursor:pointer;display:flex;align-items:center;gap:6px;}
.sync-btn:disabled{opacity:.5;cursor:not-allowed;}

.map-inline-btn{background:transparent;border:1px solid var(--brd);border-radius:8px;padding:2px 7px;font-size:16px;cursor:pointer;margin-right:4px;}
.map-inline-btn:active{background:var(--acc);}
.cur-tooltip{background:#ffeb3b!important;color:#000!important;font-weight:bold;}
/* ── KARTE ──────────────────────────────────── */
.map-overlay{display:none;position:fixed;inset:0;z-index:500;background:#071a07;flex-direction:column;}
.map-overlay.open{display:flex;}
.map-header{background:#0e2b0e;padding:12px 16px;display:flex;align-items:center;gap:12px;border-bottom:1px solid #2d6b2b;flex-shrink:0;}
.map-title{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px;color:#d8f0d8;flex:1;}
.map-close{background:#163d16;border:1.5px solid #2d6b2b;border-radius:10px;padding:8px 14px;font-size:18px;color:#d8f0d8;cursor:pointer;}
#mapContainer{flex:1;width:100%;}
.keypad-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:999;align-items:center;justify-content:center;}
.keypad-overlay.open{display:flex;}
.keypad-box{background:#0e2b0e;border-radius:22px;padding:24px 20px;width:260px;border:1px solid #4caf50;}
.keypad-title{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;text-align:center;margin-bottom:16px;}
.keypad-display{background:var(--bg);border:1.5px solid var(--brd);border-radius:12px;padding:12px;text-align:center;font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:8px;margin-bottom:16px;min-height:58px;color:var(--acc);}
.keypad-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.kp-btn{background:var(--s2);border:1.5px solid var(--brd);border-radius:12px;padding:14px;font-family:'Bebas Neue',sans-serif;font-size:24px;cursor:pointer;text-align:center;color:var(--txt);transition:all .15s;}
.kp-btn:active{background:var(--acc);color:#0f1117;border-color:var(--acc);}
.kp-del{background:var(--s2);color:var(--red);}
.kp-cancel{background:var(--s2);color:var(--mut);}
.sync-status{font-size:12px;color:var(--mut);flex:1;}
.sync-status.ok{color:var(--grn);}
.sync-status.err{color:var(--red);}
/* Notiz Popup */
.notiz-popup{display:none;position:fixed;bottom:90px;left:16px;right:16px;z-index:500;animation:slideUp .3s ease;}
.notiz-popup.show{display:block;}
@keyframes slideUp{from{transform:translateY(20px);opacity:0;}to{transform:translateY(0);opacity:1;}}
.notiz-card{background:var(--acc);border-radius:18px;padding:16px 18px;box-shadow:0 8px 32px rgba(245,166,35,.4);}
.notiz-card-header{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.notiz-card-icon{font-size:22px;}
.notiz-card-title{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:1px;color:#0f1117;flex:1;}
.notiz-card-close{background:rgba(0,0,0,.15);border:none;border-radius:8px;width:28px;height:28px;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#0f1117;}
.notiz-card-text{font-size:15px;font-weight:600;color:#0f1117;line-height:1.4;}
.notiz-card-stop{font-size:12px;color:rgba(0,0,0,.5);margin-top:4px;}
/* Notiz bearbeiten Modal */
.notiz-edit-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:600;align-items:flex-end;justify-content:center;}
.notiz-edit-overlay.open{display:flex;}
.notiz-edit-modal{background:var(--s1);border-radius:22px 22px 0 0;padding:22px 18px 30px;width:100%;max-width:560px;border:1px solid var(--brd);border-bottom:none;}
.notiz-edit-modal h3{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px;margin-bottom:6px;}
.notiz-edit-modal p{font-size:13px;color:var(--mut);margin-bottom:14px;}
.notiz-textarea{width:100%;background:var(--bg);border:1.5px solid var(--brd);color:var(--txt);border-radius:12px;padding:12px;font-family:'DM Sans',sans-serif;font-size:15px;outline:none;resize:none;height:100px;}
.notiz-textarea:focus{border-color:var(--acc);}
.notiz-actions{display:flex;gap:10px;margin-top:12px;}
.match-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:400;flex-direction:column;}
.match-overlay.open{display:flex;}
.match-header{background:var(--bg);padding:16px;border-bottom:1px solid var(--brd);display:flex;align-items:center;gap:12px;flex-shrink:0;}
.match-header h2{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;flex:1;}
.match-close{background:var(--s2);border:none;color:var(--txt);border-radius:8px;padding:8px 14px;font-family:'DM Sans',sans-serif;cursor:pointer;}
.match-status{background:var(--s2);padding:10px 16px;font-size:12px;color:var(--mut);flex-shrink:0;}
.match-list{flex:1;overflow-y:auto;padding:10px 12px;display:flex;flex-direction:column;gap:6px;}
.match-row{background:var(--s1);border:1px solid var(--brd);border-radius:12px;padding:10px 12px;display:flex;align-items:center;gap:10px;}
.match-row.found{border-color:rgba(46,204,113,.4);}
.match-row.notfound{border-color:rgba(239,68,68,.3);}
.match-row.confirmed{border-color:var(--grn);background:rgba(46,204,113,.08);}
.match-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0;}
.match-dot.green{background:var(--grn);}
.match-dot.red{background:var(--red);}
.match-dot.grey{background:var(--mut);}
.match-names{flex:1;min-width:0;}
.match-kurs{font-size:14px;font-weight:600;color:var(--txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.match-osm{font-size:12px;color:var(--mut);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px;}
.match-check{width:32px;height:32px;border-radius:8px;border:2px solid var(--brd);background:none;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.match-check.done{background:var(--grn);border-color:var(--grn);}
.match-loading{text-align:center;padding:40px;color:var(--mut);font-size:14px;}
.lch{position:relative;}
.lch-clock{display:none;position:absolute;top:10px;right:14px;background:var(--s2);border:1.5px solid var(--brd);border-radius:12px;padding:8px 14px;font-family:'Bebas Neue',sans-serif;font-size:34px;letter-spacing:2px;color:var(--txt);line-height:1;pointer-events:none;z-index:5;}
.lc.exp .lch-clock{display:block;}
</style>
</head>
<body>
<header>
  <div class="logo">🚌</div>
  <div class="htxt"><h1>KURSPLAN <span style="font-size:13px;font-weight:400;color:var(--mut);letter-spacing:1px;vertical-align:middle">v36</span></h1><p id="hd"></p></div>
  <button class="lock-btn" id="lockBtn" onclick="openKeypad()" title="Admin">🔒</button>
  <button class="lock-btn" id="themeBtn" onclick="toggleTheme()" title="Hell/Dunkel">🌙</button>
  <button id="gpsBtn" onclick="toggleGps()">
    <span style="font-size:20px;line-height:1">📍</span>
    <span id="gpsLbl">GPS AUS</span>
  </button>
</header>
<div id="gpsBar">
  <div class="gps-dot" id="gpsDot"></div>
  <span id="gpsStatus">Suche Standort...</span>
</div>
<div class="tabs" id="tabs">
  <div class="tab-filter" id="filterWe" onclick="setFilter('we')">
    <span class="tn">📅 WE</span>
    <span class="tl">Sa / So</span>
  </div>
  <div class="tab-filter" id="filterSchule" onclick="setFilter('schule')">
    <span class="tn">🏫 Schule</span>
    <span class="tl">Mo-Fr</span>
  </div>
</div>
<div class="export-bar admin-only" id="exportBar">
  <button class="export-btn" onclick="openMatchTool()" style="border-color:#8b5cf6;color:#8b5cf6">🗺 Haltestellen abgleichen</button>
</div>
<div class="sync-bar admin-only" id="syncBar">
  <button class="sync-btn" id="syncBtn" onclick="syncToGitHub()">☁️ Speichern</button>
  <button class="sync-btn" style="background:var(--s2);color:var(--txt);border:1.5px solid var(--brd)" onclick="loadFromGitHub()">🔄 Laden</button>
  <button class="sync-btn" style="background:var(--s2);color:var(--mut);border:1.5px solid var(--brd);font-size:12px" onclick="setGithubToken()">🔑 Token</button>
  <span class="sync-status" id="syncStatus">Nicht synchronisiert</span>
</div>
<main>
  <div id="kh" class="kh" style="display:none">
    <div><div class="kt" id="ktn"></div><div class="ks" id="ks"></div></div>
    <button class="bs admin-btn-inline" id="kursEditBtn" onclick="openKursEdit()" style="border-radius:10px;padding:6px 12px;font-size:13px">✏️ Bearbeiten</button>
  </div>
  <div class="ll" id="ll"></div>
  <div class="empty" id="em"><div class="bi">🚌</div><p>Kurs auswählen oder neu anlegen</p></div>
</main>
<button class="fab admin-btn-inline" id="addLineBtn" onclick="openLineModal()">+ Linie hinzufügen</button>

<div class="ov" id="ovLine" onclick="if(event.target===this)closeOv('ovLine')">
  <div class="mo">
    <h2 id="lmt">LINIE HINZUFÜGEN</h2>
    <div class="fr">
      <div class="fg"><label>Liniennummer</label><input id="iLnr" type="text" placeholder="725"></div>
      <div class="fg"><label>Fahrt-Nr.</label><input id="iFnr" type="text" placeholder="3725002"></div>
    </div>
    <div class="fr">
      <div class="fg"><label>Startort</label><input id="iS" type="text"></div>
      <div class="fg"><label>Endort</label><input id="iE" type="text"></div>

var _coordsCache = null;
function getCoords() {
  if (_coordsCache) return _coordsCache; // Cache - localStorage nur einmal lesen!
  var saved = {};
  try { saved = JSON.parse(localStorage.getItem('kp_coords') || '{}'); } catch(e) {}
  _coordsCache = {};
  var k;
  for (k in STOP_COORDS) _coordsCache[k] = STOP_COORDS[k];
  for (k in saved) _coordsCache[k] = saved[k];
  return _coordsCache;
}
function invalidateCoordsCache() { _coordsCache = null; } // Aufrufen nach GPS-Einmessen
function saveCoord(name, lat, lon) {
  var saved = {};
  try { saved = JSON.parse(localStorage.getItem('kp_coords') || '{}'); } catch(e) {}
  saved[name] = [lat, lon];
  localStorage.setItem('kp_coords', JSON.stringify(saved));
}
function haversine(a1, o1, a2, o2) {
  var R = 6371000;
  var dA = (a2-a1) * Math.PI/180;
  var dO = (o2-o1) * Math.PI/180;
  var a = Math.sin(dA/2)*Math.sin(dA/2) + Math.cos(a1*Math.PI/180)*Math.cos(a2*Math.PI/180)*Math.sin(dO/2)*Math.sin(dO/2);
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}


// Normalisiert Haltestellennamen für Vergleich
// Entfernt Kommas, Sonderzeichen, macht alles kleinbuchstaben
function normName(s) {
  return s.toLowerCase()
    .replace(/,/g, ' ')
    .replace(/\//g, ' ')
    .replace(/\./g, ' ')
    .replace(/ä/g, 'ae').replace(/ö/g, 'oe').replace(/ü/g, 'ue').replace(/ß/g, 'ss')
    .replace(/[^a-z0-9 ]/g, '')
    .replace(/\s+/g, ' ')
    .trim();
}

function loadStopCoordsFromOSM(lat, lon, callback) {
  // Alle Koordinaten sind fest eingebaut (GTFS-Daten) - kein OSM-Abgleich nötig
  if (!window._normCache) {
    window._normCache = {};
    var C = getCoords();
    for (var k in C) window._normCache[normName(k)] = C[k];
  }
  osmCoordsLoaded = true;
  if (callback) callback();
}

var leafletMap = null;
var mapMarkers = [];

function openMap(kursId, lineId) {
  // Find line data
  var kurs = null, line = null;
  for (var i = 0; i < D.kurse.length; i++) {
    if (D.kurse[i].id === kursId) {
      kurs = D.kurse[i];
      for (var j = 0; j < kurs.lines.length; j++) {
        if (kurs.lines[j].id === lineId) { line = kurs.lines[j]; break; }
      }
      break;
    }
  }
  if (!line) return;

  var overlay = document.getElementById('mapOverlay');
  document.getElementById('mapTitle').textContent = 'LINIE ' + line.linienNr + ' · ' + esc(line.start) + ' → ' + esc(line.end);
  overlay.classList.add('open');

  // Init map
  setTimeout(function() {
    if (!leafletMap) {
      leafletMap = L.map('mapContainer', {zoomControl: true});
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap',
        maxZoom: 18
      }).addTo(leafletMap);
    } else {
      // Clear old layers
      mapMarkers.forEach(function(m) { leafletMap.removeLayer(m); });
      mapMarkers = [];
    }

    var C = getCoords();
    var validStops = [];

    // Draw route shape
    var shapePts = LINE_SHAPES[line.linienNr];
    if (shapePts && shapePts.length > 0) {
      var routeLine = L.polyline(shapePts, {
        color: '#4caf50', weight: 4, opacity: 0.8
      }).addTo(leafletMap);
      mapMarkers.push(routeLine);
    }

    // Find current/next stop
    var nearI = -1;
    if (gPos && expId === lineId) {
      nearI = getCurrentNearI(line);
    }

    // Draw stops
    for (var i = 0; i < line.stops.length; i++) {
      var stop = line.stops[i];
      var coord = C[stop.name];
      if (!coord && window._normCache) coord = window._normCache[normName(stop.name)];
      if (!coord) continue;

      validStops.push(coord);
      var isCur = (i === nearI);
      var isPast = (nearI >= 0 && i < nearI);

      // Marker style
      var color = isCur ? '#ffeb3b' : isPast ? '#555' : '#4caf50';
      var radius = isCur ? 12 : 7;
      var circle = L.circleMarker([coord[0], coord[1]], {
        radius: radius,
        fillColor: color,
        color: isCur ? '#fff' : '#0e2b0e',
        weight: isCur ? 3 : 1.5,
        fillOpacity: isPast ? 0.4 : 1
      }).addTo(leafletMap);

      // Tooltip with name and time
      var label = stop.name.split(',').pop().trim();
      var tooltip = '<b>' + stop.time + '</b> ' + esc(stop.name);
      circle.bindTooltip(tooltip, {
        permanent: isCur,
        direction: 'top',
        className: isCur ? 'cur-tooltip' : ''
      });
      mapMarkers.push(circle);
    }

    // Fit map to stops or zoom to current
    if (nearI >= 0 && validStops[nearI]) {
      leafletMap.setView(validStops[nearI], 14);
    } else if (validStops.length > 0) {
      var bounds = L.latLngBounds(validStops);
      leafletMap.fitBounds(bounds, {padding: [20, 20]});
    }
  }, 100);
}

function getCurrentNearI(line) {
  if (!gPos) return -1;
  var C = getCoords();
  var nearI = -1, nearD = Infinity;
  for (var i = 0; i < line.stops.length; i++) {
    var sn = line.stops[i].name;
    var c = C[sn] || (window._normCache && window._normCache[normName(sn)]);
    if (!c) continue;
    var d = haversine(gPos.lat, gPos.lon, c[0], c[1]);
    if (d < nearD) { nearD = d; nearI = i; }
  }
  return nearI;
}

function gpsUpdate() {
  if (!gPos) return;

function toggleGps() {
  var btn = document.getElementById('gpsBtn');
  var lbl = document.getElementById('gpsLbl');
  var bar = document.getElementById('gpsBar');
  var dot = document.getElementById('gpsDot');
  var status = document.getElementById('gpsStatus');
  if (gwId !== null) {
    navigator.geolocation.clearWatch(gwId);
    clearInterval(gpsTimer);
    gwId = null; gPos = null; gpsTimer = null;
    btn.classList.remove('on','searching');
    lbl.textContent = 'GPS AUS';
    bar.classList.remove('visible');
    luStops();
  } else {
    if (!navigator.geolocation) { alert('GPS nicht verfügbar'); return; }
    btn.classList.add('searching');
    lbl.textContent = 'SUCHE...';
    bar.classList.add('visible');
    dot.className = 'gps-dot searching';
    status.textContent = 'Suche Standort...';
    // watchPosition speichert NUR die Position - kein schwerer Code hier!
    gwId = navigator.geolocation.watchPosition(
      function(p) {
        gPos = {lat: p.coords.latitude, lon: p.coords.longitude};
        // Erster Fix: OSM laden und Timer starten
        if (!gpsTimer) {
          loadStopCoordsFromOSM(gPos.lat, gPos.lon, function() {
            gpsUpdate(); // Sofort einmal updaten
            gpsTimer = setInterval(gpsUpdate, 5000); // Dann alle 5 Sekunden
          });
        }
      },
      function(err) {
        dot.className = 'gps-dot';
        status.textContent = '⚠️ GPS Fehler: ' + (err.message || 'Kein Signal');
        btn.classList.remove('searching','on');
        lbl.textContent = 'GPS ERR';
      },
      {enableHighAccuracy: false, maximumAge: 15000, timeout: 30000}
    );
  }
}
function savGps(name) {
  if (!navigator.geolocation) { alert('GPS nicht verfügbar'); return; }
  navigator.geolocation.getCurrentPosition(

  );

// STOP STATE
function stopState(name, time, allStops, idx) {
  if (gPos) {
    // GPS AN: Finde die Haltestelle mit Koordinaten die am nächsten ist
    // Diese gilt als aktuelle Haltestelle - alles davor = past, alles danach = future
    var C = getCoords();
    var nearI = -1, nearD = Infinity;
    for (var j = 0; j < allStops.length; j++) {
      var sname = allStops[j].name;
      var c = C[sname];
      // Fallback: normalisierter Name
      if (!c) {
        var norm = normName(sname);
        for (var ck in C) {
          if (normName(ck) === norm) { c = C[ck]; break; }
        }
      }
      if (!c) continue;
      var d = haversine(gPos.lat, gPos.lon, c[0], c[1]);
      if (d < nearD) { nearD = d; nearI = j; }
    }
    if (nearI < 0) return timeState(allStops, idx); // keine Koordinaten -> Zeit
    if (idx < nearI) return 'past';
    if (idx === nearI) return 'cur';
    return '';
  }
  return timeState(allStops, idx);
}
function timeState(allStops, idx) {
  var now = new Date().getHours()*60 + new Date().getMinutes();
  var ci = -1;
  for (var j = 0; j < allStops.length; j++) {
    var parts = allStops[j].time.split(':');
    if (parseInt(parts[0])*60 + parseInt(parts[1]) <= now) ci = j;
  }
  if (ci < 0) return '';
  if (idx < ci) return 'past';
  if (idx === ci) return 'cur';
  return '';
}

function luStops() {
  var kurs = null;
  var filteredK = getFilteredKurse();
  var inFilter = filteredK.some(function(k){ return k.id === D.activeKurs; });
  if (!inFilter && filteredK.length > 0) D.activeKurs = filteredK[0].id;
  for (var i = 0; i < D.kurse.length; i++) { if (D.kurse[i].id === D.activeKurs) { kurs = D.kurse[i]; break; } }
  if (!kurs || !expId) return;
  var line = null;
  for (var i = 0; i < kurs.lines.length; i++) { if (kurs.lines[i].id === expId) { line = kurs.lines[i]; break; } }
  if (!line || !line.stops) return;

  // GPS: nearI EINMAL berechnen, nicht für jede Haltestelle neu!
  var nearI = -1;
  if (gPos) {
    var C = getCoords();
    var nearD = Infinity;
    for (var j = 0; j < line.stops.length; j++) {
      var sn = line.stops[j].name;
      var c = C[sn];
      if (!c && window._normCache) { var nm = normName(sn); c = window._normCache[nm]; }
      if (!c) continue;
      var d = haversine(gPos.lat, gPos.lon, c[0], c[1]);
      if (d < nearD) { nearD = d; nearI = j; }
    }
  }

  // Status-Bar updaten
  if (nearI >= 0) {
    var nearStop = line.stops[nearI];
    var status = document.getElementById('gpsStatus');
    if (status && nearStop) {
      var C2 = getCoords();
      var c2 = C2[nearStop.name] || (window._normCache && window._normCache[normName(nearStop.name)]);
      if (c2) {
        var dist = Math.round(haversine(gPos.lat, gPos.lon, c2[0], c2[1]));
        status.textContent = '📍 ' + dist + 'm → ' + nearStop.name;
      }
    }
  }
  for (var i = 0; i < line.stops.length; i++) {
    var el = document.getElementById('sx' + line.id + i);
    if (!el) continue;
    var newSt;
    if (gPos) {
      if (nearI < 0) newSt = timeState(line.stops, i);
      else if (i < nearI) newSt = 'past';
      else if (i === nearI) newSt = 'cur';
      else newSt = '';
    } else {
      newSt = timeState(line.stops, i);
    }
    var hasPast = el.classList.contains('past'), hasCur = el.classList.contains('cur');
    var wantPast = newSt==='past', wantCur = newSt==='cur';
    if (hasPast !== wantPast || hasCur !== wantCur) {
      el.classList.remove('past','cur');
      if (newSt) el.classList.add(newSt);
    }
  }
}

function updateGpsStatus() {
  if (!gPos) return;
  var status = document.getElementById('gpsStatus');
  if (!status) return;
  var C = getCoords();
  var nearName = '', nearD = Infinity;
  for (var key in C) {
    var d = haversine(gPos.lat, gPos.lon, C[key][0], C[key][1]);
    if (d < nearD) { nearD = d; nearName = key; }
  }
  if (nearName) {
    status.textContent = '📍 ' + Math.round(nearD) + 'm → ' + nearName;
  } else {
    status.textContent = '📍 ' + gPos.lat.toFixed(5) + ', ' + gPos.lon.toFixed(5);
  }
}

function importNotizen(event) {

function getCurrentTime() {
  var n = new Date();
  var h = String(n.getHours()).padStart(2,'0');
  var m = String(n.getMinutes()).padStart(2,'0');
  var s = String(n.getSeconds()).padStart(2,'0');
  return h + ':' + m + ':' + s;
}
function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function fDate(d) {
  if (!d) return '';
  return new Date(d + 'T12:00:00').toLocaleDateString('de-DE', {weekday:'short', day:'numeric', month:'short'});
}
function dMin(a, b) {
  if (!a || !b) return 0;
  var ap = a.split(':'), bp = b.split(':');
  var d = (parseInt(bp[0])*60+parseInt(bp[1])) - (parseInt(ap[0])*60+parseInt(ap[1]));
  if (d < 0) d += 1440;
  return d;
}
function fDur(m) {
  if (!m) return '—';
  var h = Math.floor(m/60), r = m%60;
  return h > 0 ? h + 'h' + (r ? ' ' + r + 'min' : '') : r + 'min';
}

// LINES
function renderLines() {
  var kurs = null;
  for (var i = 0; i < D.kurse.length; i++) { if (D.kurse[i].id === D.activeKurs) { kurs = D.kurse[i]; break; } }
  var kh = document.getElementById('kh');
  var em = document.getElementById('em');
  var ll = document.getElementById('ll');

  if (!kurs) { kh.style.display = 'none'; em.style.display = 'block'; ll.innerHTML = ''; return; }

  kh.style.display = 'flex'; em.style.display = 'none';
  document.getElementById('ktn').textContent = kurs.name;

  var lines = kurs.lines || [];
  var tot = 0;
  for (var i = 0; i < lines.length; i++) tot += dMin(lines[i].startTime, lines[i].endTime);
  document.getElementById('ks').innerHTML =
    '<span>🚌 ' + lines.length + ' Linie' + (lines.length !== 1 ? 'n' : '') + '</span>' +
    '<span>⏱ ' + fDur(tot) + '</span>' +
    (kurs.datum ? '<span>📅 ' + fDate(kurs.datum) + '</span>' : '');

  ll.innerHTML = '';

  if (lines.length === 0) {
    ll.innerHTML = '<div class="empty"><div class="bi">📋</div><p>Noch keine Linien</p></div>';
    return;
  }

  var C = getCoords();

  for (var li = 0; li < lines.length; li++) {
    var l = lines[li];
    var isExp = (expId === l.id);

    // Build stops panel
    var stopsDiv = document.createElement('div');
    stopsDiv.className = 'sl';
    if (!l.stops || l.stops.length === 0) {
      stopsDiv.innerHTML = '<div style="padding:8px 0;font-size:13px;color:var(--mut)">Keine Haltestellen hinterlegt.</div>';
    } else {
      for (var si = 0; si < l.stops.length; si++) {
        var s = l.stops[si];
        var st = stopState(s.name, s.time, l.stops, si);
        var rowCls = 'sr';
        if (si === 0) rowCls += ' first';
        if (si === l.stops.length - 1) rowCls += ' last';
        if (st) rowCls += ' ' + st;

        var row = document.createElement('div');
        row.className = rowCls;
        row.id = 'sx' + l.id + si;
        row.innerHTML = '<div class="sd"></div><div class="st">' + esc(s.time) + '</div><div class="sn">' + esc(s.name) + '</div>';

        if (!C[s.name]) {
          var pinBtn = document.createElement('button');
          pinBtn.className = 'pb';
          pinBtn.textContent = '📍';
          (function(sname) {
            pinBtn.onclick = function(e) { e.stopPropagation(); savGps(sname); };
          })(s.name);
          row.appendChild(pinBtn);
        }
        // Notiz Button
        var notizBtn = document.createElement('button');
        var hasNotiz = notizen[s.name] && (Array.isArray(notizen[s.name]) ? notizen[s.name].length > 0 : true);
        notizBtn.className = 'notiz-btn-admin'; notizBtn.style.display = isAdmin ? '' : 'none';
        notizBtn.style.cssText = notizBtn.style.cssText || 'background:none;border:none;font-size:16px;cursor:pointer;padding:2px 4px;opacity:' + (hasNotiz ? '1' : '0.3') + ';flex-shrink:0;';
        notizBtn.textContent = hasNotiz ? '📋' : '📝';
        notizBtn.title = 'Notiz bearbeiten';
        (function(sname, stime, slinie) {
          notizBtn.onclick = function(e) { e.stopPropagation(); openNotizEdit(sname, stime, slinie); };
        })(s.name, s.time, l.linienNr);
        row.appendChild(notizBtn);
        stopsDiv.appendChild(row);
      }
    }

    var panel = document.createElement('div');
    panel.className = 'sp';
    panel.appendChild(stopsDiv);

    // Build header
    var hdr = document.createElement('div');
    hdr.className = 'lch';
    hdr.innerHTML =
      '<div class="lb"><span class="bl">Linie</span><span class="bn">' + esc(l.linienNr) + '</span>' + (AB[l.fahrtNr] ? '<span style="font-family:Bebas Neue,sans-serif;font-size:24px;color:var(--acc);letter-spacing:1px;line-height:1">' + AB[l.fahrtNr] + '</span>' : '') + '<span class="bfl">Fahrt-Nr.</span><span class="bf">' + esc(l.fahrtNr || '—') + '</span></div>' +
      '<div class="li">' +
        '<div class="lr"><span>' + esc(l.start) + '</span><span class="ar">→</span><span>' + esc(l.end) + '</span></div>' +
        '<div class="lt"><span>🕐 ' + esc(l.startTime) + '</span><span>🕓 ' + esc(l.endTime) + '</span></div>' +
        '<div class="ca">' +
          '<button class="ebtn">✏️ Bearbeiten</button>' +
          '<button class="dbtn">🗑 Löschen</button>' +
        '</div>' +
      '</div>' +
      '<div class="ri"><div class="dp">' + fDur(dMin(l.startTime, l.endTime)) + '</div><div class="ea">▼</div></div>';

    // Bind events via closures
    (function(lid, kid, ebtn, dbtn, hdrEl) {
      hdrEl.onclick = function() { toggleStops(lid); };
      ebtn.onclick = function(e) { e.stopPropagation(); editLineF(kid, lid); };
      dbtn.onclick = function(e) { e.stopPropagation(); delLine(kid, lid); };
    })(l.id, kurs.id,
       hdr.querySelector('.ebtn'),
       hdr.querySelector('.dbtn'),
       hdr);

    // Uhr oben rechts im Header
    var clockDiv = document.createElement('div');
    clockDiv.className = 'lch-clock';
    clockDiv.id = 'clock-' + l.id;
    clockDiv.textContent = getCurrentTime();
    hdr.appendChild(clockDiv);

    var card = document.createElement('div');
    card.className = 'lc' + (isExp ? ' exp' : '');
    card.appendChild(hdr);
    card.appendChild(panel);
    ll.appendChild(card);
  }
  // Admin-Modus auf neue Karten anwenden (nur einmal nach vollständigem render)
  if (typeof isAdmin !== 'undefined' && !window._skipAdminUpdate) setAdminMode(isAdmin);
}

function editLineF(kid, lid) {
  var kurs = null;
  for (var i = 0; i < D.kurse.length; i++) { if (D.kurse[i].id === kid) { kurs = D.kurse[i]; break; } }

  var line = null;

  if (!line) return;
  eLid = lid;
  document.getElementById('lmt').textContent = 'LINIE BEARBEITEN';
  document.getElementById('iLnr').value = line.linienNr;
  document.getElementById('iFnr').value = line.fahrtNr || '';
  document.getElementById('iS').value = line.start;
  document.getElementById('iE').value = line.end;
  document.getElementById('iSt').value = line.startTime;
  document.getElementById('iEt').value = line.endTime;
  var se = document.getElementById('se');
  se.innerHTML = '';
  if (line.stops) { for (var i = 0; i < line.stops.length; i++) addStopRow(line.stops[i].time, line.stops[i].name); }
  document.getElementById('ovLine').classList.add('open');

function addStopRow(t, n) {
  t = t || ''; n = n || '';
  var row = document.createElement('div');
  row.className = 'se-row';
  var ti = document.createElement('input'); ti.className = 'ti'; ti.type = 'time'; ti.value = t;
  var ni = document.createElement('input'); ni.type = 'text'; ni.value = n; ni.placeholder = 'Haltestellenname';
  var btn = document.createElement('button'); btn.textContent = '✕'; btn.onclick = function() { this.parentElement.remove(); };
  row.appendChild(ti); row.appendChild(ni); row.appendChild(btn);
  document.getElementById('se').appendChild(row);
}
function saveLineF() {
  var lnr = document.getElementById('iLnr').value.trim();
  var fnr = document.getElementById('iFnr').value.trim();
  var s   = document.getElementById('iS').value.trim();
  var e   = document.getElementById('iE').value.trim();
  var st  = document.getElementById('iSt').value;
  var et  = document.getElementById('iEt').value;
  if (!lnr || !s || !e || !st || !et) { alert('Alle Felder ausfüllen'); return; }
  var stops = [];
  var rows = document.querySelectorAll('#se .se-row');
  for (var i = 0; i < rows.length; i++) {
    var inputs = rows[i].querySelectorAll('input');
    var nt = inputs[0].value, nn = inputs[1].value.trim();
    if (nn) stops.push({time: nt, name: nn});
  }
  var kurs = null;
  for (var i = 0; i < D.kurse.length; i++) { if (D.kurse[i].id === D.activeKurs) { kurs = D.kurse[i]; break; } }
  if (!kurs) return;
  if (!kurs.lines) kurs.lines = [];
  if (eLid) {
    for (var i = 0; i < kurs.lines.length; i++) {
      if (kurs.lines[i].id === eLid) {
        Object.assign(kurs.lines[i], {linienNr:lnr,fahrtNr:fnr,start:s,end:e,startTime:st,endTime:et,stops:stops});
        break;
      }
    }
  } else {
    kurs.lines.push({id:uid(),linienNr:lnr,fahrtNr:fnr,start:s,end:e,startTime:st,endTime:et,stops:stops});
  }
  persist(); closeOv('ovLine'); renderLines();
}
function delLine(kid, lid) {
  if (!confirm('Linie löschen?')) return;
  var kurs = null;
  for (var i = 0; i < D.kurse.length; i++) { if (D.kurse[i].id === kid) { kurs = D.kurse[i]; break; } }
  if (kurs) kurs.lines = kurs.lines.filter(function(l) { return l.id !== lid; });
  if (expId === lid) expId = null;
  persist(); renderLines();
}

var osmMatchData = null;
var confirmedMatches = {};
try { confirmedMatches = JSON.parse(localStorage.getItem('kp_confirmed') || '{}'); } catch(e) {}

function normForMatch(s) {
  return s.toLowerCase()
    .replace(/,/g,' ').replace(/\//g,' ').replace(/\./g,' ')
    .replace(/ä/g,'ae').replace(/ö/g,'oe').replace(/ü/g,'ue').replace(/ß/g,'ss')
    .replace(/[^a-z0-9 ]/g,'').replace(/\s+/g,' ').trim();
}
function wordSim(a, b) {
  var wa = a.split(' ').filter(function(w){return w.length>2;});
  var wb = b.split(' ').filter(function(w){return w.length>2;});
  if (!wa.length || !wb.length) return 0;
  var m = 0;
  wa.forEach(function(w){ if(wb.some(function(x){return x===w||x.indexOf(w)>=0||w.indexOf(x)>=0;})) m++; });
  return m / Math.max(wa.length, wb.length);
}

function openMatchTool() {
  document.getElementById('matchOverlay').classList.add('open');
  if (osmMatchData) { renderMatchList(); return; }
  if (!gPos) {
    document.getElementById('matchList').innerHTML = '<div class="match-loading">⚠️ Bitte zuerst GPS einschalten!</div>';
    document.getElementById('matchStatus').textContent = 'GPS wird benötigt um OpenStreetMap-Daten zu laden';
    return;
  }
  loadOsmForMatch();
}
function closeMatchTool() {
  document.getElementById('matchOverlay').classList.remove('open');
}

function loadOsmForMatch() {
  document.getElementById('matchList').innerHTML = '<div class="match-loading">⏳ Lade Haltestellen aus OpenStreetMap...</div>';
  var query = '[out:json][timeout:30];node["highway"="bus_stop"](around:40000,' + gPos.lat + ',' + gPos.lon + ');out body;';
  fetch('https://overpass-api.de/api/interpreter?data=' + encodeURIComponent(query))
    .then(function(r){return r.json();})
    .then(function(data) {
      osmMatchData = {};
      // Nur Haltestellen speichern die in unseren Kursen vorkommen (fuzzy)
      var kursNorms = {};
      KURS_STOPS.forEach(function(s){ kursNorms[normForMatch(s)] = s; });
      (data.elements || []).forEach(function(el) {
        if (el.tags && el.tags.name) {
          var norm = normForMatch(el.tags.name);
          // Direkt oder fuzzy match mit unseren Haltestellen
          var match = kursNorms[norm];
          if (!match) {
            // Fuzzy suche
            var bestS = 0, bestK = null;
            Object.keys(kursNorms).forEach(function(kn) {
              var s = wordSim(norm, kn);
              if (s > bestS && s >= 0.75) { bestS = s; bestK = kn; }
            });
            if (bestK) match = kursNorms[bestK];
          }
          if (match) {
            osmMatchData[el.tags.name] = {lat: el.lat, lon: el.lon, kursStop: match};
          }
        }
      });
      document.getElementById('matchStatus').textContent = Object.keys(osmMatchData).length + ' OSM-Haltestellen geladen';
      renderMatchList();
    })
    .catch(function() {
      document.getElementById('matchList').innerHTML = '<div class="match-loading">❌ Fehler beim Laden. Internetverbindung prüfen.</div>';
    });
}

function renderMatchList() {
  var saved = getCoords();
  var list = document.getElementById('matchList');
  var found = 0, notFound = 0;
  var html = '';
  KURS_STOPS.forEach(function(stop) {
    var isConfirmed = confirmedMatches[stop];
    var hasSaved = saved[stop];
    // Find best OSM match
    var bestOsm = null, bestScore = 0;
    var normStop = normForMatch(stop);
    if (osmMatchData) {
      Object.keys(osmMatchData).forEach(function(osmName) {
        // Exact match
        if (osmName === stop) { bestOsm = osmName; bestScore = 1; return; }
        var s = wordSim(normStop, normForMatch(osmName));
        if (s > bestScore) { bestScore = s; bestOsm = osmName; }
      });
    }
    var matched = bestScore >= 0.75 || hasSaved || isConfirmed;
    if (matched) found++; else notFound++;
    var dotClass = isConfirmed ? 'green' : (matched ? 'green' : 'red');
    var rowClass = isConfirmed ? 'confirmed' : (matched ? 'found' : 'notfound');
    var osmText = bestOsm ? ('OSM: ' + bestOsm + ' (' + Math.round(bestScore*100) + '%)') : 'Kein OSM-Treffer';
    if (hasSaved) osmText = '📍 GPS gespeichert';
    if (isConfirmed) osmText = '✅ Bestätigt';
    var checkClass = (isConfirmed || (matched && bestScore >= 0.75)) ? 'done' : '';
    html += '<div class="match-row ' + rowClass + '" id="mr-' + stop.replace(/[^a-z0-9]/gi,'_') + '">' +
      '<div class="match-dot ' + dotClass + '"></div>' +
      '<div class="match-names">' +
        '<div class="match-kurs">' + stop + '</div>' +
        '<div class="match-osm">' + osmText + '</div>' +
      '</div>' +
      '<button class="match-check ' + checkClass + '" onclick="confirmMatch(\'' + stop.replace(/'/g,"\\'") + '\',\'' + (bestOsm||'').replace(/'/g,"\\'") + '\',' + bestScore + ')">' +
        (checkClass ? '✓' : '?') +
      '</button>' +
    '</div>';
  });
  document.getElementById('matchStatus').textContent =
    '✅ ' + found + ' gefunden  •  ❌ ' + notFound + ' nicht gefunden  •  ' + KURS_STOPS.length + ' gesamt';
  list.innerHTML = html;
}

function confirmMatch(stopName, osmName, score) {
  if (confirmedMatches[stopName]) {
    // Bereits bestätigt - wieder aufheben
    delete confirmedMatches[stopName];
  } else {
    confirmedMatches[stopName] = true;
    // Wenn OSM-Koordinaten gefunden, direkt speichern
    if (osmMatchData && osmMatchData[osmName]) {
      var saved = {};
      try { saved = JSON.parse(localStorage.getItem('kp_coords') || '{}'); } catch(e) {}
      saved[stopName] = [osmMatchData[osmName].lat, osmMatchData[osmName].lon];
      localStorage.setItem('kp_coords', JSON.stringify(saved));
    }
  }
  localStorage.setItem('kp_confirmed', JSON.stringify(confirmedMatches));
  renderMatchList();
}

  // Notizen sind jetzt ein Array von Einträgen pro Haltestelle
  var existing = notizen[stopName];
  var entry = null;
  if (Array.isArray(existing)) {
    // Finde passenden Eintrag für diese Zeit/Linie
    entry = existing.find(function(e) {
      return (!prefillTime || e.time === prefillTime) && (!prefillLinie || e.linie === prefillLinie);
    }) || existing[0];
  } else if (existing) {
    // Altes Format - konvertieren
    entry = {text: existing, time: '', linie: ''};
  }
  document.getElementById('notizTextarea').value = entry ? entry.text : '';
  document.getElementById('notizTime').value = (entry && entry.time) ? entry.time : (prefillTime || '');
  document.getElementById('notizLinie').value = (entry && entry.linie) ? entry.linie : (prefillLinie || '');

function saveNotiz() {
  var text = document.getElementById('notizTextarea').value.trim();
  var time = document.getElementById('notizTime').value;
  var linie = document.getElementById('notizLinie').value.trim();
  
  if (!text) {
    delete notizen[notizEditStop];
    saveNotizen();
    closeNotizEdit();
    renderLines();
    return;
  }
  
  var entry = {text: text, time: time, linie: linie};
  
  if (!notizen[notizEditStop]) {
    notizen[notizEditStop] = [];
  } else if (!Array.isArray(notizen[notizEditStop])) {
    // Altes Format konvertieren
    notizen[notizEditStop] = [{text: notizen[notizEditStop], time: '', linie: ''}];
  }
  
  // Prüfe ob Eintrag für diese Zeit/Linie schon existiert
  var existing = notizen[notizEditStop];
  var idx = existing.findIndex(function(e){ return e.time === time && e.linie === linie; });
  if (idx >= 0) {
    existing[idx] = entry;
  } else {
    existing.push(entry);
  }
  
  saveNotizen();
  closeNotizEdit();
  renderLines();
}
function deleteNotiz() {
  delete notizen[notizEditStop];
  saveNotizen();
  closeNotizEdit();
  renderLines();
}

function checkNotizForCurrentStop() {
  if (!expId) return;
  var kurs = null;
  for (var i=0;i<D.kurse.length;i++){if(D.kurse[i].id===D.activeKurs){kurs=D.kurse[i];break;}}
  if (!kurs) return;
  var line = null;
  for (var i=0;i<kurs.lines.length;i++){if(kurs.lines[i].id===expId){line=kurs.lines[i];break;}}
  if (!line || !line.stops) return;
  
  var now = new Date();
  var nowTime = String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
  var curLinie = line.linienNr || '';
  
  for (var i=0;i<line.stops.length;i++) {
    var el = document.getElementById('sx'+line.id+i);
    if (el && el.className.indexOf('cur') >= 0) {
      var stopName = line.stops[i].name;
      var stopTime = line.stops[i].time || '';
      var eintraege = notizen[stopName];
      if (!eintraege) break;
      
      // Altes Format
      if (!Array.isArray(eintraege)) eintraege = [{text: eintraege, time:'', linie:''}];
      
      // Finde passenden Eintrag
      var match = null;
      for (var j=0;j<eintraege.length;j++) {
        var e = eintraege[j];
        var zeitOk = !e.time || e.time === stopTime || e.time === nowTime;
        var linieOk = !e.linie || e.linie === curLinie;
        if (zeitOk && linieOk) { match = e; break; }
      }
      
      if (match && lastNotizShown !== stopName + stopTime) {
        lastNotizShown = stopName + stopTime;
        showNotizPopup(stopName, match.text, match.time, match.linie);
      }
      break;
    }
  }
}

function setDataBundle(bundle) {
  if (bundle.coords) localStorage.setItem('kp_coords', JSON.stringify(bundle.coords));
  if (bundle.notizen) {
    localStorage.setItem('kp_notizen', JSON.stringify(bundle.notizen));
    notizen = bundle.notizen;
  }
  if (bundle.kurse && bundle.kurse.length > 0) {
    // Abfahrt + typ aus SEED immer übernehmen
    var seedKursMap = {};
    SEED.kurse.forEach(function(sk){
      seedKursMap[sk.id] = sk;
    });
    var seedLineMap = {};
    SEED.kurse.forEach(function(sk){
      (sk.lines||[]).forEach(function(sl){
        if (sl.fahrtNr && sl.abfahrt) seedLineMap[sl.fahrtNr] = sl.abfahrt;
      });
    });
    // Nur Werktagskurse aus bundle laden - WE-Kurse immer aus SEED
    var merged = [];
    SEED.kurse.forEach(function(sk){
      // Suche in bundle ob dieser Kurs dort ist
      var found = null;
      bundle.kurse.forEach(function(bk){ if(bk.id===sk.id) found=bk; });
      if (found) {
        // Übernehme Daten aus bundle aber behalte typ + abfahrt aus SEED
        found.typ = sk.typ;
        (found.lines||[]).forEach(function(l){
          if (l.fahrtNr && seedLineMap[l.fahrtNr]) l.abfahrt = seedLineMap[l.fahrtNr];
        });
        merged.push(found);
      } else {
        // Kurs nicht in bundle -> aus SEED nehmen (z.B. neue WE-Kurse)
        merged.push(sk);
      }
    });
    D.kurse = merged;
    if (bundle.activeKurs) D.activeKurs = bundle.activeKurs;
    localStorage.setItem('kp_data', JSON.stringify(D));
  }
}

function setSyncStatus(msg, type) {
  var el = document.getElementById('syncStatus');
  el.textContent = msg;
  el.className = 'sync-status' + (type ? ' ' + type : '');
}

function syncToGitHub(silent) {
  var btn = document.getElementById('syncBtn');
  if (!silent) btn.disabled = true;
  if (!silent) setSyncStatus('⏳ Wird gespeichert...');
  
  var data = getDataBundle();
  var content = btoa(unescape(encodeURIComponent(JSON.stringify(data, null, 2))));
  
  // First get current SHA (needed for update)
  fetch(GITHUB_API, {
    headers: {
      'Authorization': 'token ' + GITHUB_TOKEN,
      'Accept': 'application/vnd.github.v3+json'
    }
  })
  .then(function(r) { return r.json(); })
  .then(function(existing) {
    var body = {
      message: 'Kursplan Sync ' + new Date().toLocaleString('de-DE'),
      content: content
    };
    if (existing.sha) body.sha = existing.sha;
    
    return fetch(GITHUB_API, {
      method: 'PUT',
      headers: {
        'Authorization': 'token ' + GITHUB_TOKEN,
        'Accept': 'application/vnd.github.v3+json',
        'Content-Type': 'application/json'
      },
      body: JSON.stringify(body)
    });
  })
  .then(function(r) {
    if (r.ok) {
      if (!silent) setSyncStatus('✅ Gespeichert: ' + new Date().toLocaleTimeString('de-DE'), 'ok');
      else setSyncStatus('✅ Auto-gespeichert: ' + new Date().toLocaleTimeString('de-DE'), 'ok');
    } else {
      return r.json().then(function(e) { throw new Error(e.message); });
    }
  })
  .catch(function(err) {
    setSyncStatus('❌ Fehler: ' + err.message, 'err');
  })
  .finally(function() {
    if (!silent) btn.disabled = false;
  });
}

function loadFromGitHub() {
  setSyncStatus('⏳ Wird geladen...');
  fetch(GITHUB_API, {
    headers: {
      'Authorization': 'token ' + GITHUB_TOKEN,
      'Accept': 'application/vnd.github.v3+json'
    }
  })
  .then(function(r) {
    if (!r.ok) throw new Error('Datei nicht gefunden');
    return r.json();
  })
  .then(function(data) {
    var content = JSON.parse(decodeURIComponent(escape(atob(data.content))));
    setDataBundle(content);
    setSyncStatus('✅ Geladen: ' + new Date().toLocaleTimeString('de-DE'), 'ok');
    renderLines();
  })
  .catch(function(err) {
    setSyncStatus('❌ ' + err.message, 'err');
  });
}

  document.getElementById('filterWe').className = 'tab-filter' + (f==='we' ? ' active-we' : '');
  document.getElementById('filterSchule').className = 'tab-filter' + (f==='schule' ? ' active-schule' : '');
  // Switch to first kurs of this filter
  var filtered = getFilteredKurse();
  if (filtered.length > 0) {
    D.activeKurs = filtered[0].id;
    expId = null;
  }
  renderTabs();
  renderLines();
}

function getFilteredKurse() {
  return D.kurse.filter(function(k) {
    if (activeFilter === 'schule') return k.typ === 'schule';
    return k.typ === 'sa' || k.typ === 'so';
  });
}


setFilter('schule');

setAdminMode(isAdmin);

</script>
